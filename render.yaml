services:
  - type: web
    name: young-macro-terminal-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STATE_ROOT
        value: /opt/render/project/src
      - key: CORS_ORIGINS
        value: https://young-macro-terminal-ui.onrender.com

  - type: web
    name: young-macro-terminal-ui
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://young-macro-terminal-api.onrender.com
